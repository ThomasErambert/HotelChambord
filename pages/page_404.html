<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/bootstrap.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="

      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="icon" href="../img/logo_Hotel_Chambord-ico.png" />
    <title>HOTEL CHAMBORD | Page 404</title>
    <style>
      body, html {
        height: 100%;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f8f9fa;
      }
      .error-container {
        text-align: center;
        max-width: 500px;
        padding: 2rem;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
        background-color: #fff;
      }
      .error-logo {
        width: 80px;
        margin-bottom: 1.5rem;
      }
      .error-code {
        font-size: 6rem;
        font-weight: bold;
        color: #343a40;
      }
      .error-message {
        font-size: 1.25rem;
        margin-bottom: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <img src="../img/logo_H.png" alt="Logo Hôtel Chambord" class="error-logo" />
      <div class="error-code">404</div>
      <div class="error-message">Oups ! La page que vous cherchez n'existe pas.</div>
      <a href="../index.html" class="btn btn-dark btn-lg">Retour à l'accueil</a>

    <script src="../js/bootstrap.js"></script>
